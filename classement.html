<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classement — Quiz Musical Karaoké</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#F8F7F4;color:#1a1a1a;min-height:100dvh}
#app{max-width:500px;margin:0 auto;padding:1rem}

.stage{background:#534AB7;border-radius:16px;padding:1.75rem 1.5rem;text-align:center;margin-bottom:1.25rem}
.stage-icon{font-size:36px;margin-bottom:.5rem}
.stage-title{font-size:22px;font-weight:600;color:#EEEDFE;margin-bottom:.2rem}
.stage-sub{font-size:13px;color:#AFA9EC}

.refresh-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.refresh-label{font-size:12px;color:#888}
.refresh-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#1D9E75;margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.player-count{font-size:12px;color:#888;font-weight:500}

.empty-msg{text-align:center;font-size:14px;color:#888;padding:2rem 0}

.row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;margin-bottom:8px;border:1px solid transparent}
.r1{background:#FAEEDA;border-color:#F5D98C}
.r2{background:#F1EFE8;border-color:#D3D1C7}
.r3{background:#FAECE7;border-color:#F5C4B3}
.rx{background:#fff;border-color:#E5E4E0}

.rank{width:34px;height:34px;min-width:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600}
.rk1{background:#BA7517;color:#FAEEDA}
.rk2{background:#888780;color:#F1EFE8}
.rk3{background:#D85A30;color:#FAECE7}
.rkx{background:#D3D1C7;color:#444}

.info{flex:1}
.pname{font-size:15px;font-weight:500}
.pdetail{font-size:12px;color:#888;margin-top:2px}
.pscore{font-size:22px;font-weight:600}

.link-quiz{display:block;text-align:center;margin-top:1rem;font-size:13px;color:#534AB7;text-decoration:underline}
</style>
</head>
<body>
<div id="app">

<div class="stage">
  <div class="stage-icon">🏆</div>
  <div class="stage-title">Classement en direct</div>
  <div class="stage-sub">Quiz Musical Karaoké · BAM Madeleine</div>
</div>

<div class="refresh-bar">
  <span class="refresh-label"><span class="refresh-dot"></span>Actualisation automatique</span>
  <span class="player-count" id="count">0 / 14 joueurs</span>
</div>

<div id="board"><div class="empty-msg">Aucun score pour le moment...</div></div>

<a class="link-quiz" href="index.html">🎤 Jouer le quiz</a>

</div>

<script>
/* ========================================================
   ⚠️  REMPLACE CES DEUX VALEURS (les mêmes que dans index.html)
   ======================================================== */
const SUPABASE_URL = 'https://orsfxzohgktypbetyojp.supabase.co';
const SUPABASE_KEY = 'sb_publishable_OdbAydUantYncwR4BAUp5A_QB87_U7Z';
/* ======================================================== */

let sb=null;

async function init(){
  try{
    sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  }catch(e){console.warn('Supabase init error',e);}
  await refresh();
  setInterval(refresh,5000);
}

async function refresh(){
  if(!sb)return;
  try{
    const{data,error}=await sb.from('scores').select('*').order('points',{ascending:false});
    if(error){console.warn(error);return;}
    render(data||[]);
  }catch(e){console.warn(e);}
}

function render(rows){
  const board=document.getElementById('board');
  document.getElementById('count').textContent=rows.length+' / 14 joueurs';
  if(!rows.length){board.innerHTML='<div class="empty-msg">Aucun score pour le moment...</div>';return;}
  board.innerHTML='';
  rows.forEach((r,i)=>{
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':'rx';
    const rk=i===0?'rk1':i===1?'rk2':i===2?'rk3':'rkx';
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
    const d=document.createElement('div');
    d.className='row '+rc;
    d.innerHTML=`<div class="rank ${rk}">${medal}</div><div class="info"><div class="pname">${r.prenom}</div><div class="pdetail">${r.bonnes_reponses} bonnes réponses sur 20</div></div><div class="pscore">${r.points}</div>`;
    board.appendChild(d);
  });
}

init();
</script>
</body>
</html>
